<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>LedgerPro — Accounting</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{colors:{pri:"#00333c","pri-d":"#004b57",sec:"#2c694e",surf:"#f7f9ff","surf-c":"#ebeef4","surf-ch":"#e5e8ee","surf-cl":"#f1f4fa","surf-w":"#ffffff",out:"#70787b","on-s":"#181c20","on-sv":"#40484a","out-v":"#bfc8ca",err:"#ba1a1a"},fontFamily:{h:["Manrope"],b:["Inter"]}}}}
</script>
<style>
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f7f9ff;color:#181c20;margin:0}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400;vertical-align:middle}
.tnum{font-variant-numeric:tabular-nums}
.grad{background:linear-gradient(135deg,#00333c,#004b57)}

/* Layout */
.side{position:fixed;left:0;top:0;height:100%;width:256px;background:#f8fafc;border-right:1px solid #e2e8f0;z-index:40;transition:transform .3s;font-family:'Manrope',sans-serif}
.side-link{display:flex;align-items:center;gap:10px;padding:10px 16px;color:#64748b;font-size:13px;font-weight:600;border-right:3px solid transparent;cursor:pointer;transition:all .15s}
.side-link:hover{color:#00333c;background:#e2e8f0}
.side-link.on{color:#00333c;background:rgba(226,232,240,.6);border-right-color:#00333c;font-weight:700}
.topbar{position:fixed;top:0;right:0;left:256px;height:60px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:30}
.main{margin-left:256px;padding:80px 32px 48px}

/* Page */
.pg{display:none}.pg.on{display:block}

/* Modal */
.mdl{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.mdl.on{display:flex}
.mdl-c{background:#fff;border-radius:16px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}

/* Toast */
.tst{position:fixed;bottom:24px;right:24px;z-index:200;padding:12px 20px;border-radius:12px;color:#fff;font-weight:600;font-size:14px;transform:translateY(80px);opacity:0;transition:all .3s}
.tst.on{transform:translateY(0);opacity:1}
.tst.ok{background:#2c694e}.tst.er{background:#ba1a1a}.tst.in{background:#00333c}

/* Cards */
.scard{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.bg{background:#dcfce7;color:#166534}.br{background:#fef2f2;color:#991b1b}.bb{background:#dbeafe;color:#1e40af}.by{background:#fef9c3;color:#854d0e}.bgr{background:#f1f5f9;color:#475569}
.empty{display:flex;flex-direction:column;align-items:center;padding:48px 24px;text-align:center;color:#70787b}
.erow{transition:background .1s}.erow:hover{background:#f1f4fa}

/* Responsive */
@media(max-width:1024px){.side{transform:translateX(-100%)}.side.open{transform:translateX(0)}.main{margin-left:0}.topbar{left:0}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Line items grid */
.li-grid{display:grid;grid-template-columns:2fr 2fr 70px 100px 100px 36px;gap:6px;align-items:center}
@media(max-width:640px){.li-grid{grid-template-columns:1fr 1fr;gap:4px}}
</style>
</head>
<body>

<div id="tst" class="tst"></div>
<button class="fixed top-3 left-3 z-50 lg:hidden bg-white rounded-lg p-2 shadow" onclick="$id('side').classList.toggle('open')"><span class="material-symbols-outlined">menu</span></button>

<!-- SIDEBAR -->
<aside id="side" class="side">
<div class="flex flex-col h-full">
  <div class="p-5 pb-3"><div class="text-xl font-bold tracking-tight text-pri">LedgerPro</div><div class="text-[9px] uppercase tracking-[.2em] text-slate-400 mt-0.5">Device Accounting · ₹ INR</div></div>
  <nav class="flex-1 px-2 space-y-0.5 overflow-y-auto" id="nav"></nav>
  <div class="px-2 pb-5 space-y-0.5">
    <div class="side-link" onclick="nav('settings')"><span class="material-symbols-outlined text-xl">settings</span>Settings</div>
    <div class="side-link" onclick="backupData()"><span class="material-symbols-outlined text-xl">download</span>Backup</div>
  </div>
</div>
</aside>

<!-- TOPBAR -->
<header class="topbar"><div class="text-sm font-semibold text-on-sv" id="pageTitle">Dashboard</div><div class="w-8 h-8 rounded-full grad flex items-center justify-center text-white text-xs font-bold" id="avatar">LP</div></header>

<!-- MAIN -->
<main class="main" id="app"></main>

<!-- MODALS -->
<div id="mParty" class="mdl" onclick="if(event.target===this)closeMdl('mParty')"><div class="mdl-c" style="max-width:480px" id="mPartyInner"></div></div>
<div id="mPay" class="mdl" onclick="if(event.target===this)closeMdl('mPay')"><div class="mdl-c" style="max-width:420px" id="mPayInner"></div></div>
<div id="mSale" class="mdl" onclick="if(event.target===this)closeMdl('mSale')"><div class="mdl-c" style="max-width:760px" id="mSaleInner"></div></div>
<div id="mPurchase" class="mdl" onclick="if(event.target===this)closeMdl('mPurchase')"><div class="mdl-c" style="max-width:700px" id="mPurchaseInner"></div></div>
<div id="mExp" class="mdl" onclick="if(event.target===this)closeMdl('mExp')"><div class="mdl-c" style="max-width:460px" id="mExpInner"></div></div>
<div id="mItem" class="mdl" onclick="if(event.target===this)closeMdl('mItem')"><div class="mdl-c" style="max-width:480px" id="mItemInner"></div></div>
<div id="mPreview" class="mdl" onclick="if(event.target===this)closeMdl('mPreview')"><div class="mdl-c" style="max-width:700px" id="mPreviewInner"></div></div>

<script>
// =================================================
//  INDEXEDDB — device storage layer
// =================================================
const DB_NAME='LedgerPro',DB_VER=1;
const STORES=['parties','sales','purchases','payments','expenses','items','categories','settings'];
let db;

function openDB(){
  return new Promise((ok,fail)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      STORES.forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id'})});
    };
    r.onsuccess=e=>{db=e.target.result;ok(db)};
    r.onerror=e=>fail(e);
  });
}

const dbPut=(s,d)=>new Promise((ok,fail)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).put(d);t.oncomplete=()=>ok(d);t.onerror=e=>fail(e)});
const dbDel=(s,id)=>new Promise((ok,fail)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(id);t.oncomplete=()=>ok();t.onerror=e=>fail(e)});
const dbAll=(s)=>new Promise((ok,fail)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).getAll();r.onsuccess=()=>ok(r.result||[]);r.onerror=e=>fail(e)});
const dbGet=(s,id)=>new Promise((ok,fail)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).get(id);r.onsuccess=()=>ok(r.result);r.onerror=e=>fail(e)});

// =================================================
//  UTILITIES
// =================================================
const uid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,8);
const $id=id=>document.getElementById(id);
const fmt=n=>'₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'';
const today=()=>new Date().toISOString().split('T')[0];
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().substr(0,3);
const CATS=['Rent','Salary','Utilities','Travel','Food & Beverages','Office Supplies','Internet & Phone','Software','Marketing','Insurance','Maintenance','Professional Services','Fuel','Courier','Miscellaneous'];

function toast(m,t='ok'){const e=$id('tst');e.textContent=m;e.className='tst '+t+' on';setTimeout(()=>e.classList.remove('on'),3e3)}
function openMdl(id){$id(id).classList.add('on')}
function closeMdl(id){$id(id).classList.remove('on')}

async function getSettings(){const a=await dbAll('settings');return a.length?a[0]:{}}
async function ensureCategories(){const c=await dbAll('categories');if(!c.length)for(const n of CATS)await dbPut('categories',{id:uid(),name:n})}

// =================================================
//  STATE
// =================================================
let curPage='dashboard', curPartyId=null, curPartyFilter='all', curRptType='pnl';

const PAGES=[
  {id:'dashboard',icon:'dashboard',label:'Dashboard'},
  {id:'parties',icon:'group',label:'Parties'},
  {id:'sales',icon:'storefront',label:'Sales'},
  {id:'purchases',icon:'shopping_cart',label:'Purchases'},
  {id:'expenses',icon:'receipt_long',label:'Expenses'},
  {id:'inventory',icon:'inventory_2',label:'Inventory'},
  {id:'reports',icon:'assessment',label:'Reports'},
];

// =================================================
//  NAVIGATION
// =================================================
function buildNav(){
  $id('nav').innerHTML=PAGES.map(p=>`<div class="side-link ${p.id===curPage?'on':''}" data-pg="${p.id}" onclick="nav('${p.id}')"><span class="material-symbols-outlined text-xl">${p.icon}</span>${p.label}</div>`).join('');
}

async function nav(page,data){
  curPage=page;
  $id('side').classList.remove('open');
  buildNav();
  $id('pageTitle').textContent=PAGES.find(p=>p.id===page)?.label||page;
  switch(page){
    case'dashboard':await renderDash();break;
    case'parties':await renderParties();break;
    case'partyDetail':curPartyId=data;await renderPartyDetail();$id('pageTitle').textContent='Party Details';break;
    case'sales':await renderSales();break;
    case'purchases':await renderPurchases();break;
    case'expenses':await renderExpenses();break;
    case'inventory':await renderInventory();break;
    case'reports':await renderReports();break;
    case'settings':await renderSettings();break;
  }
}

// =================================================
//  BALANCE CALCULATION (core logic)
// =================================================
async function calcPartyBalance(partyId){
  const p=await dbGet('parties',partyId);
  if(!p)return 0;
  let bal=0;
  if(p.openingType==='receivable')bal+=Number(p.openingBalance)||0;
  if(p.openingType==='payable')bal-=Number(p.openingBalance)||0;
  const sales=await dbAll('sales');
  sales.filter(s=>s.partyId===partyId&&s.status!=='paid').forEach(s=>bal+=Number(s.grandTotal)||0);
  const purchases=await dbAll('purchases');
  purchases.filter(x=>x.partyId===partyId&&x.status!=='paid').forEach(x=>bal-=Number(x.grandTotal)||0);
  const payments=await dbAll('payments');
  payments.filter(x=>x.partyId===partyId).forEach(x=>{
    if(x.direction==='received')bal-=Number(x.amount)||0;
    if(x.direction==='given')bal+=Number(x.amount)||0;
  });
  return bal;
}

async function getPartyEntries(partyId){
  const sales=(await dbAll('sales')).filter(s=>s.partyId===partyId);
  const purchases=(await dbAll('purchases')).filter(x=>x.partyId===partyId);
  const payments=(await dbAll('payments')).filter(x=>x.partyId===partyId);
  const entries=[];
  sales.forEach(s=>{
    const items=s.items||[];
    entries.push({date:s.date,type:'sale',label:'Sale #'+(s.invoiceNo||''),items:items.map(i=>`${i.name} ×${i.qty} @₹${Number(i.price).toFixed(2)}`).join(', '),taxInfo:s.taxAmount>0?`Tax ${s.taxRate}%: ${fmt(s.taxAmount)}`:'',debit:s.status!=='paid'?s.grandTotal:0,credit:0,total:s.grandTotal,status:s.status,id:s.id,store:'sales'});
  });
  purchases.forEach(x=>{
    const items=x.items||[];
    entries.push({date:x.date,type:'purchase',label:'Purchase #'+(x.billNo||''),items:items.map(i=>`${i.name} ×${i.qty} @₹${Number(i.price).toFixed(2)}`).join(', '),taxInfo:'',debit:0,credit:x.status!=='paid'?x.grandTotal:0,total:x.grandTotal,status:x.status,id:x.id,store:'purchases'});
  });
  payments.forEach(x=>{
    entries.push({date:x.date,type:x.direction==='received'?'payment_in':'payment_out',label:x.direction==='received'?'Payment Received':'Credit Given',items:x.notes||'',taxInfo:'',debit:x.direction==='given'?x.amount:0,credit:x.direction==='received'?x.amount:0,total:x.amount,status:'',id:x.id,store:'payments'});
  });
  entries.sort((a,b)=>a.date.localeCompare(b.date)||a.type.localeCompare(b.type));
  return entries;
}

// =================================================
//  DASHBOARD
// =================================================
async function renderDash(){
  const sales=await dbAll('sales'),purs=await dbAll('purchases'),exps=await dbAll('expenses'),parties=await dbAll('parties');
  const now=new Date(),ms=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];
  const mSales=sales.filter(s=>s.date>=ms).reduce((a,s)=>a+(Number(s.grandTotal)||0),0);
  const mPur=purs.filter(p=>p.date>=ms).reduce((a,p)=>a+(Number(p.grandTotal)||0),0);
  const mExp=exps.filter(e=>e.date>=ms).reduce((a,e)=>a+(Number(e.amount)||0),0);
  const net=mSales-mPur-mExp;
  // Outstanding
  let totRec=0,totPay=0;const debtors=[],creditors=[];
  for(const p of parties){const b=await calcPartyBalance(p.id);if(b>0){totRec+=b;debtors.push({name:p.name,amount:b})}if(b<0){totPay+=Math.abs(b);creditors.push({name:p.name,amount:Math.abs(b)})}}
  debtors.sort((a,b)=>b.amount-a.amount);creditors.sort((a,b)=>b.amount-a.amount);
  // Recent
  const recent=[...sales.slice(-5).map(s=>({d:s.date,n:s.partyName||s.invoiceNo,t:'Sale',a:s.grandTotal,c:'text-green-700'})),...purs.slice(-3).map(p=>({d:p.date,n:p.partyName||p.billNo,t:'Purchase',a:p.grandTotal,c:'text-blue-700'})),...exps.slice(-3).map(e=>({d:e.date,n:e.vendor||e.category,t:'Expense',a:e.amount,c:'text-red-700'}))].sort((a,b)=>b.d>a.d?1:-1).slice(0,8);

  $id('app').innerHTML=`
  <div class="mb-8"><h1 class="font-h text-3xl font-extrabold tracking-tight text-pri">Dashboard</h1><p class="text-on-sv text-sm mt-1">This month's overview · All data on this device</p></div>
  <div class="grid grid-cols-2 xl:grid-cols-4 gap-4 mb-8">
    <div class="scard"><div class="text-[10px] font-bold uppercase tracking-widest text-on-sv">Sales</div><div class="font-h text-2xl font-extrabold tnum text-green-700 mt-2">${fmt(mSales)}</div></div>
    <div class="scard"><div class="text-[10px] font-bold uppercase tracking-widest text-on-sv">Purchases</div><div class="font-h text-2xl font-extrabold tnum text-blue-700 mt-2">${fmt(mPur)}</div></div>
    <div class="scard"><div class="text-[10px] font-bold uppercase tracking-widest text-on-sv">Expenses</div><div class="font-h text-2xl font-extrabold tnum text-red-700 mt-2">${fmt(mExp)}</div></div>
    <div class="scard"><div class="text-[10px] font-bold uppercase tracking-widest text-on-sv">Net Profit</div><div class="font-h text-2xl font-extrabold tnum ${net>=0?'text-green-700':'text-red-700'} mt-2">${fmt(net)}</div></div>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <div class="scard"><h3 class="font-h font-bold text-pri mb-3">To Receive — <span class="text-green-700 tnum">${fmt(totRec)}</span></h3>${debtors.length?debtors.slice(0,5).map(d=>`<div class="flex justify-between py-1.5 text-sm"><span>${d.name}</span><span class="font-bold tnum text-green-700">${fmt(d.amount)}</span></div>`).join(''):'<p class="text-sm text-out">No receivables</p>'}</div>
    <div class="scard"><h3 class="font-h font-bold text-pri mb-3">To Pay — <span class="text-red-700 tnum">${fmt(totPay)}</span></h3>${creditors.length?creditors.slice(0,5).map(c=>`<div class="flex justify-between py-1.5 text-sm"><span>${c.name}</span><span class="font-bold tnum text-red-700">${fmt(c.amount)}</span></div>`).join(''):'<p class="text-sm text-out">No payables</p>'}</div>
  </div>
  <div class="scard"><h3 class="font-h font-bold text-pri mb-3">Recent Activity</h3>${recent.length?recent.map(r=>`<div class="flex justify-between py-1.5 text-sm"><div><span class="font-semibold">${r.n}</span><span class="text-out text-xs ml-2">${fmtD(r.d)} · ${r.t}</span></div><span class="font-bold tnum ${r.c}">${fmt(r.a)}</span></div>`).join(''):'<p class="text-sm text-out">No activity yet</p>'}</div>`;
}

// =================================================
//  PARTIES
// =================================================
async function renderParties(){
  const parties=await dbAll('parties');
  const filtered=curPartyFilter==='all'?parties:parties.filter(p=>p.type===curPartyFilter||p.type==='both');
  const balMap={};
  for(const p of parties)balMap[p.id]=await calcPartyBalance(p.id);
  const sorted=filtered.sort((a,b)=>a.name.localeCompare(b.name));

  $id('app').innerHTML=`
  <div class="flex flex-col sm:flex-row gap-4 mb-6 items-start sm:items-end justify-between">
    <div><h1 class="font-h text-3xl font-extrabold tracking-tight text-pri">Parties</h1><p class="text-on-sv text-sm mt-1">Manage customers & suppliers</p></div>
    <button class="grad text-white px-5 py-2.5 rounded-xl font-bold text-xs uppercase tracking-wider flex items-center gap-2" onclick="openPartyForm()"><span class="material-symbols-outlined text-sm">add</span>Add Party</button>
  </div>
  <div class="flex gap-2 mb-5" id="pfilters">
    <button class="px-4 py-2 rounded-lg text-xs font-bold ${curPartyFilter==='all'?'bg-pri text-white':'bg-surf-cl text-on-sv'}" onclick="curPartyFilter='all';renderParties()">All</button>
    <button class="px-4 py-2 rounded-lg text-xs font-bold ${curPartyFilter==='customer'?'bg-pri text-white':'bg-surf-cl text-on-sv'}" onclick="curPartyFilter='customer';renderParties()">Customers</button>
    <button class="px-4 py-2 rounded-lg text-xs font-bold ${curPartyFilter==='supplier'?'bg-pri text-white':'bg-surf-cl text-on-sv'}" onclick="curPartyFilter='supplier';renderParties()">Suppliers</button>
  </div>
  <div class="space-y-2" id="plist">
    ${sorted.length?sorted.map(p=>{
      const b=balMap[p.id]||0;const bc=b>0?'text-green-700':b<0?'text-red-700':'text-out';
      const bt=b>0?'To receive':b<0?'To pay':'Settled';
      return`<div class="scard flex items-center justify-between cursor-pointer hover:shadow-md transition-shadow" onclick="nav('partyDetail','${p.id}')">
        <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg grad flex items-center justify-center text-white font-bold text-xs">${ini(p.name)}</div><div><div class="text-sm font-bold text-pri">${p.name}</div><div class="text-[10px] text-out capitalize">${p.type}${p.phone?' · '+p.phone:''}</div></div></div>
        <div class="text-right"><div class="text-sm font-bold tnum ${bc}">${fmt(Math.abs(b))}</div><div class="text-[10px] ${bc}">${bt}</div></div>
      </div>`}).join(''):'<div class="empty"><span class="material-symbols-outlined text-5xl mb-3 text-out-v">group</span><p class="font-semibold text-lg">No parties yet</p></div>'}
  </div>`;
}

function openPartyForm(id){
  $id('mPartyInner').innerHTML=`
  <div class="p-5 border-b border-surf-ch/40 flex justify-between items-center"><h2 class="font-h text-lg font-bold text-pri">${id?'Edit':'Add'} Party</h2><button onclick="closeMdl('mParty')" class="text-out hover:text-pri"><span class="material-symbols-outlined">close</span></button></div>
  <div class="p-5 space-y-3">
    <input type="hidden" id="fPartyId" value="${id||''}"/>
    <div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">Name *</label><input id="fPartyName" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2.5 text-sm focus:ring-1 focus:ring-pri" placeholder="Party name"/></div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">Type</label><select id="fPartyType" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2.5 text-sm focus:ring-1 focus:ring-pri"><option value="customer">Customer</option><option value="supplier">Supplier</option><option value="both">Both</option></select></div>
      <div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">Phone</label><input id="fPartyPhone" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2.5 text-sm focus:ring-1 focus:ring-pri" placeholder="+91..."/></div>
    </div>
    <div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">GSTIN</label><input id="fPartyGstin" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2.5 text-sm focus:ring-1 focus:ring-pri" maxlength="15"/></div>
    <div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">Address</label><textarea id="fPartyAddr" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2.5 text-sm focus:ring-1 focus:ring-pri" rows="2"></textarea></div>

// -- DOWNLOADS --
async function downloadPDF(){
  const p=await dbGet('parties',curPartyId);const st=await getSettings();const entries=await getPartyEntries(curPartyId);
  let bal=0;if(p.openingType==='receivable')bal=Number(p.openingBalance)||0;if(p.openingType==='payable')bal=-(Number(p.openingBalance)||0);
  const rows=[];
  if(bal!==0)rows.push(['-','Opening Balance','',bal>0?Number(bal).toFixed(2):'',bal<0?Number(Math.abs(bal)).toFixed(2):'',Number(bal).toFixed(2)]);
  entries.forEach(e=>{bal+=e.debit-e.credit;rows.push([fmtD(e.date),e.label+(e.items?' | '+e.items:'')+(e.taxInfo?' | '+e.taxInfo:''),e.status||'',e.debit>0?Number(e.debit).toFixed(2):'',e.credit>0?Number(e.credit).toFixed(2):'',Number(bal).toFixed(2)])});

  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(st.companyName||'Your Business',14,18);
  doc.setFontSize(8);doc.setFont('helvetica','normal');let y=24;
  if(st.address){doc.text(st.address,14,y);y+=4}if(st.gstin){doc.text('GSTIN: '+st.gstin,14,y);y+=4}if(st.phone){doc.text('Phone: '+st.phone,14,y);y+=4}
  y+=4;doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text('ACCOUNT STATEMENT',14,y);y+=6;
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(`Party: ${p.name}  |  Type: ${p.type}  |  Date: ${fmtD(today())}`,14,y);y+=4;
  if(p.phone)doc.text('Phone: '+p.phone,14,y);if(p.gstin)doc.text('  GSTIN: '+p.gstin,p.phone?80:14,y);y+=6;

  doc.autoTable({startY:y,head:[['Date','Description','Status','Debit (₹)','Credit (₹)','Balance (₹)']],body:rows,styles:{fontSize:7.5,cellPadding:2},headStyles:{fillColor:[0,51,60],fontStyle:'bold'},alternateRowStyles:{fillColor:[245,247,252]},columnStyles:{0:{cellWidth:22},3:{halign:'right',cellWidth:22},4:{halign:'right',cellWidth:22},5:{halign:'right',cellWidth:22}}});

  const fy=doc.lastAutoTable.finalY+8;doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text(`Closing Balance: ${bal>0?fmt(bal)+' (To Receive)':bal<0?fmt(Math.abs(bal))+' (To Pay)':'₹0.00 (Settled)'}`,14,fy);
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text('Generated by LedgerPro · All amounts in INR (₹)',14,fy+6);
  doc.save(`Statement_${p.name.replace(/[^a-zA-Z0-9]/g,'_')}_${today()}.pdf`);toast('PDF downloaded');
}

async function downloadCSV(){
  const p=await dbGet('parties',curPartyId);const entries=await getPartyEntries(curPartyId);
  let bal=0;if(p.openingType==='receivable')bal=Number(p.openingBalance)||0;if(p.openingType==='payable')bal=-(Number(p.openingBalance)||0);
  let csv='Date,Description,Items,Status,Debit (₹),Credit (₹),Balance (₹)\n';
  if(bal!==0)csv+=`"Opening","Opening Balance","","",${bal>0?bal.toFixed(2):''},${bal<0?Math.abs(bal).toFixed(2):''},${bal.toFixed(2)}\n`;
  entries.forEach(e=>{bal+=e.debit-e.credit;csv+=`"${e.date}","${e.label}","${(e.items||'').replace(/"/g,'""')}","${e.status||''}",${e.debit>0?e.debit.toFixed(2):''},${e.credit>0?e.credit.toFixed(2):''},${bal.toFixed(2)}\n`});
  const blob=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=`Statement_${p.name.replace(/[^a-zA-Z0-9]/g,'_')}_${today()}.csv`;a.click();URL.revokeObjectURL(u);toast('CSV downloaded');
}

function onSTaxPreset(){
  const v=$id('fSTaxPreset').value;
  if(v==='custom'){$id('fSTaxCustom').classList.remove('hidden');$id('fSTaxCustom').focus()}
  else{$id('fSTaxCustom').classList.add('hidden')}
  recalcS();
}

function recalcS(){
  let subtotal=0;
  document.querySelectorAll('.sale-line').forEach(row=>{
    const qty=parseFloat(row.querySelector('.sli-qty').value)||0;
    const price=parseFloat(row.querySelector('.sli-price').value)||0;
    const amt=qty*price;subtotal+=amt;
    row.querySelector('.sli-amt').textContent=fmt(amt);
  });
  const preset=$id('fSTaxPreset').value;
  const taxRate=preset==='custom'?(parseFloat($id('fSTaxCustom').value)||0):(parseFloat(preset)||0);
  const discount=parseFloat($id('fSDisc').value)||0;
  const taxableAmt=Math.max(0,subtotal-discount);
  const taxAmount=taxableAmt*taxRate/100;
  const grandTotal=taxableAmt+taxAmount;
  const taxType=$id('fSTaxType').value;

  $id('sSub').textContent=fmt(subtotal);

  if(taxType==='gst'&&taxRate>0){
    $id('sTR1').style.display='flex';$id('sTR2').style.display='flex';
    $id('sTL1').textContent=`CGST (${(taxRate/2).toFixed(1)}%)`;$id('sTL2').textContent=`SGST (${(taxRate/2).toFixed(1)}%)`;
    $id('sTA1').textContent=fmt(taxAmount/2);$id('sTA2').textContent=fmt(taxAmount/2);
  }else if((taxType==='igst'||taxType==='custom')&&taxRate>0){
    $id('sTR1').style.display='flex';$id('sTR2').style.display='none';
    $id('sTL1').textContent=taxType==='igst'?`IGST (${taxRate}%)`:`Tax (${taxRate}%)`;
    $id('sTA1').textContent=fmt(taxAmount);
  }else{$id('sTR1').style.display='none';$id('sTR2').style.display='none'}

  $id('sDiscR').style.display=discount>0?'flex':'none';
  $id('sDiscA').textContent='−'+fmt(discount);
  $id('sGT').textContent=fmt(grandTotal);
}

async function saveSale(){
  const partyId=$id('fSParty').value;if(!partyId){toast('Select customer','er');return}
  const invNo=$id('fSInv').value.trim();if(!invNo){toast('Invoice # required','er');return}
  const date=$id('fSDate').value;if(!date){toast('Date required','er');return}

  const items=[];let ok=true;
  document.querySelectorAll('.sale-line').forEach(row=>{
    const name=row.querySelector('.sli-name').value.trim();
    const desc=row.querySelector('.sli-desc').value.trim();
    const qty=parseFloat(row.querySelector('.sli-qty').value)||0;
    const price=parseFloat(row.querySelector('.sli-price').value)||0;
    if(name&&qty>0&&price>0)items.push({name,description:desc,qty,price,amount:qty*price});
    else if(name||qty||price)ok=false;
  });
  if(!items.length){toast('Add at least one complete item','er');return}
  if(!ok){toast('Fill all item fields (name, qty, price)','er');return}

  const subtotal=items.reduce((a,i)=>a+i.amount,0);
  const preset=$id('fSTaxPreset').value;
  const taxRate=preset==='custom'?(parseFloat($id('fSTaxCustom').value)||0):(parseFloat(preset)||0);
  const taxType=$id('fSTaxType').value;
  const discount=parseFloat($id('fSDisc').value)||0;
  const taxableAmt=Math.max(0,subtotal-discount);
  const taxAmount=taxableAmt*taxRate/100;
  const grandTotal=taxableAmt+taxAmount;
  const party=await dbGet('parties',partyId);

  const data={id:uid(),invoiceNo:invNo,date,partyId,partyName:party?party.name:'',items,subtotal,discount,taxType,taxRate,taxAmount,grandTotal,paymentMode:$id('fSPayMode').value,status:$id('fSStatus').value,notes:$id('fSNotes').value.trim(),createdAt:new Date().toISOString()};
  await dbPut('sales',data);closeMdl('mSale');toast('Sale saved!');renderSales();
}

async function genRpt(){
  const from=$id('rF')?.value||'2000-01-01',to=$id('rT')?.value||'2099-12-31';
  const sales=(await dbAll('sales')).filter(s=>s.date>=from&&s.date<=to);
  const purs=(await dbAll('purchases')).filter(p=>p.date>=from&&p.date<=to);
  const exps=(await dbAll('expenses')).filter(e=>e.date>=from&&e.date<=to);
  const parties=await dbAll('parties');
  const el=$id('rptOut');if(!el)return;

  if(curRptType==='pnl'){
    const tS=sales.reduce((a,s)=>a+(s.grandTotal||0),0),tP=purs.reduce((a,p)=>a+(p.grandTotal||0),0),gp=tS-tP,tE=exps.reduce((a,e)=>a+(Number(e.amount)||0),0),np=gp-tE;
    const catT={};exps.forEach(e=>{catT[e.category]=(catT[e.category]||0)+(Number(e.amount)||0)});
    el.innerHTML=`<h2 class="font-h text-xl font-bold text-pri mb-4">Profit & Loss</h2><div class="text-xs text-out mb-4">${fmtD(from)} to ${fmtD(to)}</div><table class="w-full text-sm"><tr class="border-b"><td class="py-3 font-bold text-green-700">Sales</td><td class="py-3 text-right font-bold tnum text-green-700">${fmt(tS)}</td></tr><tr class="border-b"><td class="py-3 text-blue-700 pl-4">Less: Purchases</td><td class="py-3 text-right tnum text-blue-700">(${fmt(tP)})</td></tr><tr class="border-b-2 bg-surf-cl"><td class="py-3 font-bold text-pri">Gross Profit</td><td class="py-3 text-right font-bold tnum text-pri">${fmt(gp)}</td></tr><tr><td class="py-2 pt-4 font-bold text-on-sv">Expenses</td><td></td></tr>${Object.entries(catT).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`<tr class="border-b border-surf-ch/30"><td class="py-2 pl-6 text-on-sv">${c}</td><td class="py-2 text-right tnum">${fmt(a)}</td></tr>`).join('')}<tr class="border-b"><td class="py-3 text-red-700 pl-4">Total Expenses</td><td class="py-3 text-right font-bold tnum text-red-700">(${fmt(tE)})</td></tr><tr class="bg-pri/5"><td class="py-4 font-h font-bold text-lg text-pri">Net Profit/(Loss)</td><td class="py-4 text-right font-h font-extrabold text-lg tnum ${np>=0?'text-green-700':'text-red-700'}">${fmt(np)}</td></tr></table>`;
  }else if(curRptType==='daybook'){
    const all=[...sales.map(s=>({d:s.date,desc:'Sale: '+s.partyName+(s.invoiceNo?' #'+s.invoiceNo:''),dr:0,cr:s.grandTotal})),...purs.map(p=>({d:p.date,desc:'Purchase: '+p.partyName,dr:p.grandTotal,cr:0})),...exps.map(e=>({d:e.date,desc:'Expense: '+(e.vendor||e.category),dr:Number(e.amount),cr:0}))].sort((a,b)=>a.d.localeCompare(b.d));
    el.innerHTML=`<h2 class="font-h text-xl font-bold text-pri mb-4">Day Book</h2><table class="w-full text-sm"><thead><tr class="bg-surf-ch/50"><th class="px-4 py-2 text-left text-[10px] font-bold uppercase text-on-sv">Date</th><th class="px-4 py-2 text-left text-[10px] font-bold uppercase text-on-sv">Particulars</th><th class="px-4 py-2 text-right text-[10px] font-bold uppercase text-on-sv">Debit ₹</th><th class="px-4 py-2 text-right text-[10px] font-bold uppercase text-on-sv">Credit ₹</th></tr></thead><tbody class="divide-y">${all.map(a=>`<tr class="erow"><td class="px-4 py-2 tnum">${fmtD(a.d)}</td><td class="px-4 py-2">${a.desc}</td><td class="px-4 py-2 text-right tnum ${a.dr?'font-bold text-red-700':''}">${a.dr?fmt(a.dr):''}</td><td class="px-4 py-2 text-right tnum ${a.cr?'font-bold text-green-700':''}">${a.cr?fmt(a.cr):''}</td></tr>`).join('')}</tbody></table>`;
  }else if(curRptType==='gst'){
    const gS=sales.filter(s=>(s.taxAmount||0)>0),gP=purs.filter(p=>(p.taxAmount||0)>0);const oG=gS.reduce((a,s)=>a+(s.taxAmount||0),0),iG=gP.reduce((a,p)=>a+(p.taxAmount||0),0),net=oG-iG;
    el.innerHTML=`<h2 class="font-h text-xl font-bold text-pri mb-4">GST Summary</h2><div class="grid grid-cols-3 gap-4 mb-6"><div class="scard"><div class="text-[10px] font-bold uppercase text-on-sv">Output GST</div><div class="font-h text-xl font-extrabold tnum text-red-700 mt-1">${fmt(oG)}</div></div><div class="scard"><div class="text-[10px] font-bold uppercase text-on-sv">Input GST</div><div class="font-h text-xl font-extrabold tnum text-green-700 mt-1">${fmt(iG)}</div></div><div class="scard"><div class="text-[10px] font-bold uppercase text-on-sv">Net ${net>=0?'Payable':'Refundable'}</div><div class="font-h text-xl font-extrabold tnum ${net>=0?'text-red-700':'text-green-700'} mt-1">${fmt(Math.abs(net))}</div></div></div>
    <h3 class="font-bold text-sm mb-2">Sales GST Detail</h3><table class="w-full text-sm"><thead><tr class="bg-surf-ch/50"><th class="px-4 py-2 text-left text-[10px] font-bold uppercase text-on-sv">Date</th><th class="px-4 py-2 text-left text-[10px] font-bold uppercase text-on-sv">Customer</th><th class="px-4 py-2 text-right text-[10px] font-bold uppercase text-on-sv">Taxable ₹</th><th class="px-4 py-2 text-right text-[10px] font-bold uppercase text-on-sv">Rate</th><th class="px-4 py-2 text-right text-[10px] font-bold uppercase text-on-sv">Tax ₹</th></tr></thead><tbody class="divide-y">${gS.length?gS.map(s=>`<tr class="erow"><td class="px-4 py-2 tnum">${fmtD(s.date)}</td><td class="px-4 py-2">${s.partyName}</td><td class="px-4 py-2 text-right tnum">${fmt(s.subtotal-(s.discount||0))}</td><td class="px-4 py-2 text-right">${s.taxRate}%</td><td class="px-4 py-2 text-right font-bold tnum">${fmt(s.taxAmount)}</td></tr>`).join(''):'<tr><td colspan="5" class="px-4 py-4 text-center text-out">No data</td></tr>'}</tbody></table>`;
  }else if(curRptType==='outstanding'){
    const rec={},pay={};
    for(const p of parties){const b=await calcPartyBalance(p.id);if(b>0.01)rec[p.name]=b;if(b<-0.01)pay[p.name]=Math.abs(b)}
    el.innerHTML=`<h2 class="font-h text-xl font-bold text-pri mb-4">Outstanding</h2><div class="grid grid-cols-1 lg:grid-cols-2 gap-8"><div><h3 class="font-bold text-green-700 mb-3 uppercase text-xs tracking-wider">Receivables</h3><table class="w-full text-sm"><tbody class="divide-y">${Object.entries(rec).sort((a,b)=>b[1]-a[1]).map(([n,a])=>`<tr class="erow"><td class="py-2 font-semibold">${n}</td><td class="py-2 text-right font-bold tnum text-green-700">${fmt(a)}</td></tr>`).join('')||'<tr><td class="py-4 text-out">None</td></tr>'}<tr class="bg-green-50"><td class="py-3 font-bold">Total</td><td class="py-3 text-right font-bold tnum text-green-700">${fmt(Object.values(rec).reduce((a,v)=>a+v,0))}</td></tr></tbody></table></div><div><h3 class="font-bold text-red-700 mb-3 uppercase text-xs tracking-wider">Payables</h3><table class="w-full text-sm"><tbody class="divide-y">${Object.entries(pay).sort((a,b)=>b[1]-a[1]).map(([n,a])=>`<tr class="erow"><td class="py-2 font-semibold">${n}</td><td class="py-2 text-right font-bold tnum text-red-700">${fmt(a)}</td></tr>`).join('')||'<tr><td class="py-4 text-out">None</td></tr>'}<tr class="bg-red-50"><td class="py-3 font-bold">Total</td><td class="py-3 text-right font-bold tnum text-red-700">${fmt(Object.values(pay).reduce((a,v)=>a+v,0))}</td></tr></tbody></table></div></div>`;
  }
}

  $id('app').innerHTML=`<div class="mb-6"><h1 class="font-h text-3xl font-extrabold tracking-tight text-pri">Settings</h1></div>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="scard"><h3 class="font-h font-bold text-pri mb-4">Company Info</h3><div class="space-y-3"><div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">Company Name</label><input id="stName" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-pri" value="${st.companyName||''}"/></div><div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">GSTIN</label><input id="stGst" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-pri" value="${st.gstin||''}" maxlength="15"/></div><div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">Address</label><textarea id="stAddr" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-pri" rows="2">${st.address||''}</textarea></div><div><label class="text-[10px] font-bold text-on-sv uppercase tracking-wider">Phone</label><input id="stPhone" class="w-full mt-1 bg-surf-cl border-none rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-pri" value="${st.phone||''}"/></div><button class="w-full grad text-white px-5 py-2.5 rounded-lg text-xs font-bold uppercase mt-2" onclick="saveSt()">Save</button></div></div>
    <div class="scard"><h3 class="font-h font-bold text-pri mb-4">Expense Categories</h3><div class="flex gap-2 mb-3"><input id="newCat" class="flex-1 bg-surf-cl border-none rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-pri" placeholder="New category"/><button class="px-4 py-2 bg-pri text-white rounded-lg text-xs font-bold" onclick="addCat()">Add</button></div><div class="space-y-1 max-h-48 overflow-y-auto" id="catList">${cats.map(c=>`<div class="flex justify-between items-center px-3 py-1.5 bg-surf-cl rounded-lg"><span class="text-sm">${c.name}</span><button class="text-out hover:text-red-600" onclick="dbDel('categories','${c.id}').then(()=>renderSettings())"><span class="material-symbols-outlined text-sm">close</span></button></div>`).join('')}</div></div>
    <div class="scard lg:col-span-2"><h3 class="font-h font-bold text-pri mb-4">Data Management</h3><div class="flex flex-wrap gap-3"><button class="flex items-center gap-2 px-4 py-3 bg-surf-cl rounded-lg text-sm font-semibold hover:bg-surf-c" onclick="backupData()"><span class="material-symbols-outlined text-pri">download</span>Export Backup</button><label class="flex items-center gap-2 px-4 py-3 bg-surf-cl rounded-lg text-sm font-semibold hover:bg-surf-c cursor-pointer"><span class="material-symbols-outlined text-pri">upload</span>Import Backup<input type="file" accept=".json" class="hidden" onchange="importData(event)"/></label><button class="flex items-center gap-2 px-4 py-3 bg-red-50 rounded-lg text-sm font-semibold text-red-700 hover:bg-red-100" onclick="clearData()"><span class="material-symbols-outlined">delete_forever</span>Clear All</button></div></div>
  </div>`;
}
async function saveSt(){await dbPut('settings',{id:'main',companyName:$id('stName').value.trim(),gstin:$id('stGst').value.trim().toUpperCase(),address:$id('stAddr').value.trim(),phone:$id('stPhone').value.trim()});toast('Settings saved');const s=await getSettings();if(s.companyName)$id('avatar').textContent=ini(s.companyName)}
async function addCat(){const n=$id('newCat').value.trim();if(!n)return;await dbPut('categories',{id:uid(),name:n});$id('newCat').value='';renderSettings();toast('Added')}

// =================================================
//  DATA MANAGEMENT
// =================================================
async function backupData(){const d={v:'3.0',at:new Date().toISOString()};for(const s of STORES)d[s]=await dbAll(s);const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`LedgerPro-Backup-${today()}.json`;a.click();URL.revokeObjectURL(u);toast('Backup downloaded')}
async function importData(ev){const f=ev.target.files[0];if(!f)return;if(!confirm('This REPLACES all data. Continue?')){ev.target.value='';return}try{const d=JSON.parse(await f.text());for(const s of STORES){const ex=await dbAll(s);for(const x of ex)await dbDel(s,x.id);if(d[s]&&Array.isArray(d[s]))for(const x of d[s])await dbPut(s,x)}toast('Data imported!');nav(curPage)}catch(e){toast('Error: '+e.message,'er')}ev.target.value=''}
async function clearData(){if(!confirm('⚠️ DELETE ALL DATA permanently?'))return;for(const s of STORES){const ex=await dbAll(s);for(const x of ex)await dbDel(s,x.id)}toast('All data cleared','in');nav('dashboard')}

// =================================================
//  INIT
// =================================================
async function init(){
  try{
    await openDB();
    await ensureCategories();
    buildNav();
    const st=await getSettings();
    if(st.companyName)$id('avatar').textContent=ini(st.companyName);
    if(window.innerWidth>=1024)$id('side').classList.add('open');
    window.addEventListener('resize',()=>{if(window.innerWidth>=1024)$id('side').classList.add('open')});
    await renderDash();
    console.log('✅ LedgerPro v3 initialized — IndexedDB storage, all amounts in ₹');
  }catch(e){console.error(e);toast('Initialization error','er')}
}
init();
</script>
</body>
</html>
